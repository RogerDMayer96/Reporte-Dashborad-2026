<script>
(function() {
  // Secciones en el MISMO orden que aparecen en el RMD
  var pages = [
    { label: "📊 Embudo Semanal",          value: "Embudo Semanal" },
    { label: "📡 Canal o Campaña",         value: "Canal o Campaña" },
    { label: "🏠 Objeto de Inversión",     value: "Objeto de Inversión" },
    { label: "📈 Gráficas Evolutivas",     value: "Gráficas evolutivas" },
    { label: "👥 Prospectos por Canales",  value: "Prospectos por Canales" },
    { label: "🔍 Canales Desagregados",    value: "Canales desagregados" },
    { label: "🏡 Interés por Inmueble",    value: "Interes por Inmueble" },
    { label: "💰 Interés por Inversión",   value: "Interes por Inversión" },
    { label: "📍 Zona de Interés",         value: "Zona de interés" },
    { label: "🏘️ Inmuebles por Zona",      value: "Inmuebles por Zona" },
    { label: "🗂️ Tabla de Datos",          value: "Tabla de Datos" }
  ];

  function findTab(value) {
    // flexdashboard pone el nombre de la sección en el texto del tab o en data-value
    var tabs = document.querySelectorAll(".navbar-nav > li > a");
    for (var i = 0; i < tabs.length; i++) {
      var tabText = tabs[i].textContent.trim();
      if (tabText === value || tabs[i].getAttribute("data-value") === value) {
        return tabs[i];
      }
    }
    return null;
  }

  function setActive(li_list, idx) {
    li_list.forEach(function(li, i) {
      li.querySelector("a").classList.toggle("sb-active", i === idx);
    });
  }

  function buildSidebar() {
    var sidebar = document.createElement("nav");
    sidebar.id = "sb-nav";

    var title = document.createElement("div");
    title.id = "sb-title";
    title.textContent = "SECCIONES";
    sidebar.appendChild(title);

    var ul = document.createElement("ul");
    var liItems = [];

    pages.forEach(function(p, idx) {
      var li = document.createElement("li");
      var a  = document.createElement("a");
      a.href = "#";
      a.textContent = p.label;

      a.addEventListener("click", function(e) {
        e.preventDefault();
        setActive(liItems, idx);
        // Hacer clic en el tab real de flexdashboard
        var tab = findTab(p.value);
        if (tab) tab.click();
        // Cerrar en móvil
        if (window.innerWidth <= 768) {
          sidebar.classList.remove("sb-mobile-open");
          document.getElementById("sb-overlay").classList.remove("sb-show");
        }
      });

      li.appendChild(a);
      ul.appendChild(li);
      liItems.push(li);
    });

    sidebar.appendChild(ul);
    document.body.appendChild(sidebar);

    // Marcar el primer tab como activo al cargar
    setActive(liItems, 0);

    // Sincronizar cuando flexdashboard cambia de página por otros medios
    document.addEventListener("click", function(e) {
      var clicked = e.target.closest(".navbar-nav > li > a");
      if (!clicked) return;
      var val = clicked.textContent.trim();
      liItems.forEach(function(li, i) {
        li.querySelector("a").classList.toggle("sb-active", pages[i].value === val);
      });
    });
  }

  // Esperar a que el DOM esté completamente listo
  function init() {
    buildSidebar();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<style>


/* Ocultar tabs de página del navbar (reemplazados por sidebar) */
.navbar-nav > li { display: none !important; }

/* ── Sidebar fijo izquierda ────────────────────────────────────────────── */
#sb-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 230px;
  height: 100vh;
  background: #2C3E50;
  border-right: 2px solid #AED6F1;
  box-shadow: 3px 0 16px rgba(0,0,0,0.5);
  z-index: 1500;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  -webkit-overflow-scrolling: touch;
}

/* ── Título ────────────────────────────────────────────────────────────── */
#sb-title {
  color: #AED6F1;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 58px 16px 10px 16px;
  border-bottom: 1px solid #1a252f;
  flex-shrink: 0;
}

/* ── Links: font-size igual al dashboard (14px) ────────────────────────── */
#sb-nav ul {
  list-style: none;
  margin: 6px 0 0 0;
  padding: 0;
  flex: 1;
}
#sb-nav ul li { margin: 0; padding: 0; }
#sb-nav ul a {
  display: block;
  padding: 10px 16px;
  color: #8b949e;
  text-decoration: none;
  font-size: 14px;          /* igual al body del dashboard */
  font-weight: 400;
  border-left: 3px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  cursor: pointer;
}
#sb-nav ul a:hover {
  color: #e6edf3;
  background: rgba(174,214,241,0.10);
  border-left-color: #7FB3D3;
}
#sb-nav ul a.sb-active {
  color: #AED6F1;
  background: rgba(174,214,241,0.18);
  border-left-color: #AED6F1;
  font-weight: 600;
}

/* ── Empujar contenido 215px a la derecha ──────────────────────────────── */
body { padding-left: 230px !important; }
.navbar {
  left: 230px !important;
  width: calc(100% - 230px) !important;
}

/* ── Scrollbar ─────────────────────────────────────────────────────────── */
#sb-nav::-webkit-scrollbar { width: 4px; }
#sb-nav::-webkit-scrollbar-track { background: #2C3E50; }
#sb-nav::-webkit-scrollbar-thumb { background: #1a252f; border-radius: 2px; }
#sb-nav::-webkit-scrollbar-thumb:hover { background: #AED6F1; }

/* ── Responsive móvil ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sb-nav {
    width: 200px;
    transform: translateX(-200px);
    transition: transform 0.25s ease;
    z-index: 2100;
  }
  #sb-nav.sb-mobile-open { transform: translateX(0); }
  body { padding-left: 0 !important; }
  .navbar { left: 0 !important; width: 100% !important; }
  #sb-toggle { display: flex !important; }
  #sb-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 2090;
  }
  #sb-overlay.sb-show { display: block; }
}

/* Botón hamburguesa (solo móvil) */
#sb-toggle {
  display: none;
  position: fixed; top: 8px; left: 8px;
  z-index: 2200;
  background: #AED6F1; color: #2C3E50;
  border: none; border-radius: 6px;
  width: 36px; height: 36px; font-size: 1.2rem;
  align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(174,214,241,0.5);
}
</style>

<script>
(function() {
  function setupMobile() {
    var btn = document.createElement("button");
    btn.id = "sb-toggle";
    btn.innerHTML = "&#9776;";
    document.body.appendChild(btn);

    var overlay = document.createElement("div");
    overlay.id = "sb-overlay";
    document.body.appendChild(overlay);

    var sidebar = document.getElementById("sb-nav");
    if (!sidebar) return;

    btn.addEventListener("click", function() {
      sidebar.classList.toggle("sb-mobile-open");
      overlay.classList.toggle("sb-show");
    });
    overlay.addEventListener("click", function() {
      sidebar.classList.remove("sb-mobile-open");
      overlay.classList.remove("sb-show");
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupMobile);
  } else {
    setupMobile();
  }
})();
</script>
